name: Build & Push Selenium Runner Image
on:
  push:
    branches:
      - "**"
    paths:
      - selenium-runner/**
      - .github/workflows/build-selenium-runner.yml

permissions:
  contents: read
  packages: write   # required for GHCR

jobs:
  build-and-push:
    name: Build & Push Selenium Runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/selenium-runner
          tags: |
            type=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: selenium-runner/
          file: selenium-runner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
